# .devscripts.conf — project config for scripts/verify_pr.sh & prune_merged.sh.
#
# Plain KEY=VALUE bash, sourced by the scripts if present at the repo root.
# Every knob is optional: unset ones fall back to auto-detection, then safe
# defaults. The scripts themselves stay identical across projects — only this
# file differs.

# TEST_CMD — full-suite command for verify_pr.sh. Left UNSET on purpose:
# auto-detection sees tests/ + pytest and runs
#   <borrowed-venv-python> -m pytest tests/ -q
# borrowing the main worktree's venv (metatv runs from source, so linked
# worktrees need no venv of their own). Uncomment only to override.
# TEST_CMD="venv/bin/python -m pytest tests/ -q"

# PROTECTED_BRANCHES — extra never-prune globs, APPENDED to the built-in
# defaults (main master develop). MetaTV also protects work-in-progress
# branches from prune_merged.sh.
PROTECTED_BRANCHES="wip/*"

# BASE_BRANCH — trunk to measure "merged"/diff against. Unset → auto from
# origin/HEAD (→ main here). Uncomment to override.
# BASE_BRANCH="main"
