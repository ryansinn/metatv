# MetaTV Sports Definitions — Bundled Defaults
# ─────────────────────────────────────────────────────────────────────────────
# This file ships with the application and defines the default keyword rules
# for sport type and league detection.
#
# DO NOT edit this file directly — use the Settings UI to create a personal
# override at ~/.config/metatv/sports_definitions.yaml instead.
# (Community improvements to these defaults belong in a GitHub issue/PR.)
#
# sport_keywords:
#   Maps a canonical sport name to keywords matched against channel names/categories.
#   Order matters — the first matching sport wins (put more specific entries first).
#
# league_keywords:
#   Maps a league display name to keywords matched against channel names/categories.
#   First match wins.
#
# After changes, repopulate the database:
#   python -m metatv.scripts.populate_special_content --sports-only --force
# ─────────────────────────────────────────────────────────────────────────────

